<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suka Brew — Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #397DFF;
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --text: #f0f0f5;
      --text-muted: #8890aa;
      --border: #2e3248;
      --green: #4ade80;
      --yellow: #facc15;
      --red: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 24px; min-height: 100vh; }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-size: 22px; }
    .page-header a { color: var(--primary); text-decoration: none; font-size: 14px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .stat-card .label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 36px; font-weight: 700; }
    .stat-card .sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 28px; }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .chart-card h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; }

    .feedback-list { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
    .feedback-list h3 { font-size: 15px; margin-bottom: 16px; }

    .feedback-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .feedback-item:last-child { border-bottom: none; }
    .feedback-item .meta { color: var(--text-muted); font-size: 11px; margin-bottom: 4px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .badge.yes { background: rgba(74,222,128,.15); color: var(--green); }
    .badge.no { background: rgba(248,113,113,.15); color: var(--red); }

    .refresh-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>📊 Suka Brew Analytics</h1>
    <div style="display:flex;gap:12px;align-items:center">
      <button class="refresh-btn" onclick="loadStats()">↻ Refresh</button>
      <a href="/">← Back to Chat</a>
    </div>
  </div>

  <div class="grid">
    <div class="stat-card">
      <div class="label">Total Responses</div>
      <div class="value" id="totalCount">—</div>
      <div class="sub">customer feedbacks</div>
    </div>
    <div class="stat-card">
      <div class="label">Liked Suggestions</div>
      <div class="value" id="likedPct" style="color:var(--green)">—</div>
      <div class="sub" id="likedAbs"></div>
    </div>
    <div class="stat-card">
      <div class="label">Enjoyed Recommendation</div>
      <div class="value" id="enjoyedPct" style="color:var(--yellow)">—</div>
      <div class="sub" id="enjoyedAbs"></div>
    </div>
    <div class="stat-card">
      <div class="label">Would Recommend</div>
      <div class="value" id="recommendPct" style="color:var(--primary)">—</div>
      <div class="sub" id="recommendAbs"></div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>Satisfaction Overview</h3>
      <canvas id="donutChart" height="200"></canvas>
    </div>
    <div class="chart-card">
      <h3>Daily Feedback Trend (Last 7 Days)</h3>
      <canvas id="lineChart" height="200"></canvas>
    </div>
  </div>

  <div class="feedback-list">
    <h3>Recent Feedback</h3>
    <div id="feedbackList"><p style="color:var(--text-muted);font-size:13px">No feedback yet.</p></div>
  </div>

<script>
let donutChart, lineChart;

async function loadStats() {
  try {
    const res = await fetch('/api/analytics');
    const data = await res.json();
    if (!data.success) return;
    const s = data.stats;

    document.getElementById('totalCount').textContent = s.total;
    document.getElementById('likedPct').textContent = s.total ? s.likedSuggestions.pct + '%' : '—';
    document.getElementById('likedAbs').textContent = `${s.likedSuggestions.yes} of ${s.total}`;
    document.getElementById('enjoyedPct').textContent = s.total ? s.enjoyedRecommendation.pct + '%' : '—';
    document.getElementById('enjoyedAbs').textContent = `${s.enjoyedRecommendation.yes} of ${s.total}`;
    document.getElementById('recommendPct').textContent = s.total ? s.wouldRecommend.pct + '%' : '—';
    document.getElementById('recommendAbs').textContent = `${s.wouldRecommend.yes} of ${s.total}`;

    renderDonut(s);
    renderLine(s.dailyTrend);
    renderFeedbackList(s.recentFeedback);
  } catch(e) {
    console.error('Analytics error:', e);
  }
}

function renderDonut(s) {
  const ctx = document.getElementById('donutChart').getContext('2d');
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Liked', "Didn't Like", 'Enjoyed', "Didn't Enjoy", 'Would Recommend', "Wouldn't"],
      datasets: [{
        data: [
          s.likedSuggestions.yes, s.likedSuggestions.no,
          s.enjoyedRecommendation.yes, s.enjoyedRecommendation.no,
          s.wouldRecommend.yes, s.wouldRecommend.no
        ],
        backgroundColor: ['#4ade80','#f87171','#facc15','#fb923c','#397DFF','#6366f1'],
        borderWidth: 0,
      }]
    },
    options: {
      plugins: { legend: { labels: { color: '#8890aa', font: { size: 11 } } } },
      cutout: '60%',
    }
  });
}

function renderLine(trend) {
  const ctx = document.getElementById('lineChart').getContext('2d');
  if (lineChart) lineChart.destroy();
  lineChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: trend.map(d => d.date.slice(5)),
      datasets: [{
        label: 'Responses',
        data: trend.map(d => d.count),
        borderColor: '#397DFF',
        backgroundColor: 'rgba(57,125,255,0.15)',
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#397DFF',
      }]
    },
    options: {
      scales: {
        x: { ticks: { color: '#8890aa' }, grid: { color: '#2e3248' } },
        y: { ticks: { color: '#8890aa', stepSize: 1 }, grid: { color: '#2e3248' }, beginAtZero: true }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function renderFeedbackList(items) {
  const el = document.getElementById('feedbackList');
  if (!items.length) { el.innerHTML = '<p style="color:var(--text-muted);font-size:13px">No feedback yet.</p>'; return; }
  el.innerHTML = items.map(f => `
    <div class="feedback-item">
      <div class="meta">${new Date(f.timestamp).toLocaleString()} · ${f.id.slice(0,8)}</div>
      <span class="badge ${f.wouldRecommend ? 'yes' : 'no'}">${f.wouldRecommend ? '✅ Recommends' : '❌ Wouldn\'t recommend'}</span>
      ${f.comments ? `<p style="margin-top:6px;color:var(--text)">"${f.comments}"</p>` : ''}
    </div>
  `).join('');
}

loadStats();
setInterval(loadStats, 30000); // auto-refresh every 30s
</script>
</body>
</html>
